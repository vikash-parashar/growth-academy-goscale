# Optional: add GitHub secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# (Vercel → Project → Settings → Git can also deploy without this workflow.)
name: Deploy frontend to Vercel
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/vercel-frontend.yml"
  workflow_dispatch: {}

concurrency:
  group: vercel-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install & build (sanity check)
        run: npm ci && npm run build

      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"

      - name: Vercel secrets not configured
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        run: |
          echo "::notice title=Vercel GitHub Action skipped::This workflow did not deploy because VERCEL_TOKEN is not set."
          echo "To enable: add VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID in Repo → Settings → Secrets."
          echo "Or connect the repo in the Vercel dashboard (recommended) — deployments still work without this workflow."
