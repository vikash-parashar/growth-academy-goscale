# Render Blueprint — push this repo to GitHub, then: Render Dashboard → New → Blueprint → connect repo.
# Free tier: web service sleeps when idle; set secrets in the Render dashboard after first deploy.

services:
  - type: web
    name: goscale-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: GIN_MODE
        value: release
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      # Set in dashboard when you enable payments (see backend/.env.example)
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
